<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Charontak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="../base1/cockpit.js"></script>
  <script src="charontak.js"></script>
</head>
<body class="page-ct">
  <h1>Charontak</h1>
  <p>PyTAK CoT echelon bridge — service status and configuration.</p>

  <div>
    <button id="btn-status" class="pf-c-button pf-m-primary">Refresh status</button>
    <button id="btn-restart" class="pf-c-button pf-m-secondary">Restart service</button>
    <button id="btn-journal" class="pf-c-button pf-m-secondary">Recent journal</button>
  </div>

  <h2>systemctl status</h2>
  <pre id="out-status" style="white-space: pre-wrap; background: #f5f5f5; padding: 1em"></pre>

  <h2>Config <code>/etc/charontak.ini</code></h2>
  <p><small>Load/save uses administrator access (polkit/sudo prompt). Save checks for on-disk changes before overwriting.</small></p>
  <textarea id="cfg" rows="22" cols="100" style="width:100%; font-family: monospace"></textarea>
  <div style="margin-top:0.5em">
    <button id="btn-load-cfg" class="pf-c-button pf-m-secondary">Load config</button>
    <button id="btn-save-cfg" class="pf-c-button pf-m-danger">Save config</button>
  </div>
</body>
</html>
