<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Charontak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="charontak.css">
  <script src="../base1/cockpit.js"></script>
  <script src="charontak.js"></script>
</head>
<body class="page-ct">
  <main class="ct-shell">
  <h1>Charontak</h1>
  <p>PyTAK CoT echelon bridge - service status and configuration.</p>

  <section class="ct-card">
    <div class="ct-actions">
      <button id="btn-status" class="ct-btn ct-btn-primary">Refresh status</button>
      <button id="btn-restart" class="ct-btn">Restart service</button>
      <button id="btn-journal" class="ct-btn">Recent journal</button>
    </div>

    <h2>systemctl status</h2>
    <pre id="out-status"></pre>
  </section>

  <section class="ct-card">
    <h2>Config <code>/etc/charontak.ini</code></h2>
    <p><small>Load/save uses administrator access. Save checks for on-disk changes before overwriting.</small></p>
    <textarea id="cfg" rows="22" cols="100" spellcheck="false"></textarea>
    <div class="ct-actions">
      <button id="btn-load-cfg" class="ct-btn">Load config</button>
      <button id="btn-save-cfg" class="ct-btn ct-btn-danger">Save config</button>
    </div>
  </section>
  </main>
</body>
</html>
