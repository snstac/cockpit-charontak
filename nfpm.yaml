# nfpm config — packages the esbuild bundle from dist/.
# Usage: make package   (or: VERSION=1.0.0 nfpm package -f nfpm.yaml -p deb -t out/)
name: cockpit-charontak
arch: all
platform: linux
version: ${VERSION}
release: "1"
section: web
priority: optional
maintainer: "Sensors & Signals LLC <oss@snstac.com>"
vendor: "Sensors & Signals LLC"
homepage: https://github.com/snstac/cockpit-charontak
license: Apache-2.0
description: |
  Cockpit web console plugin for Charontak, the CoT bridge / TAK Server lane
  manager. Structured lane editor with PyTAK CoT URL validation, service
  control, TLS certificate upload, journal output, and a raw config editor.

depends:
  - cockpit-bridge
recommends:
  - charontak

contents:
  - src: ./dist/
    dst: /usr/share/cockpit/charontak/
    type: tree
