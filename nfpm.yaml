# nfpm config — static Cockpit plugin, no build step.
# Usage: VERSION=1.0.0 nfpm package -f nfpm.yaml -p deb -t out/
name: cockpit-charontak
arch: all
platform: linux
version: ${VERSION}
release: "1"
section: web
priority: optional
maintainer: "Sensors & Signals LLC <oss@snstac.com>"
vendor: "Sensors & Signals LLC"
homepage: https://github.com/snstac/cockpit-charontak
license: Apache-2.0
description: |
  Cockpit web console plugin for Charontak, the CoT bridge / TAK Server lane
  manager. Service control, /etc/charontak.ini editing, journal output.

depends:
  - cockpit-bridge
recommends:
  - charontak

contents:
  - src: ./charontak.js
    dst: /usr/share/cockpit/charontak/charontak.js
  - src: ./index.html
    dst: /usr/share/cockpit/charontak/index.html
  - src: ./manifest.json
    dst: /usr/share/cockpit/charontak/manifest.json
